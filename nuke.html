<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NUKE 💣</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>:root{--bg:#0d0d1a;--card:#0f0f2a;--card2:#111128;--cyan:#00fff5;--pink:#ff006e;--yellow:#ffe600;--green:#39ff14;--dim:#556;--text:#e8e8ff;--border:#1e1e3f}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;overflow-x:hidden;user-select:none;background-image:linear-gradient(rgba(0,255,245,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,245,0.03) 1px,transparent 1px);background-size:20px 20px}.wrap{width:100%;max-width:460px;padding:12px;min-height:100vh;position:relative}.screen{display:none}.active{display:flex;flex-direction:column;animation:fIn .25s ease}@keyframes fIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.logo-wrap{text-align:center;padding:28px 0 12px}.logo-nuke{font-family:'Press Start 2P',monospace;font-size:3.5rem;color:var(--cyan);text-shadow:0 0 10px var(--cyan),0 0 30px var(--cyan),4px 4px 0 #005a58;display:block;letter-spacing:4px;line-height:1}.logo-bomb{font-size:3rem;display:block;animation:bFloat 2s ease-in-out infinite;margin-bottom:6px}@keyframes bFloat{0%,100%{transform:translateY(0) rotate(-8deg);filter:drop-shadow(0 6px 12px rgba(255,0,110,.5))}50%{transform:translateY(-10px) rotate(8deg);filter:drop-shadow(0 18px 22px rgba(255,0,110,.7))}}.logo-by{font-size:.45rem;letter-spacing:2px;color:var(--dim);margin-top:6px;font-family:'Press Start 2P',monospace}.pxb{background:var(--card2);border:2px solid var(--border);box-shadow:4px 4px 0 #000,inset 0 1px 0 rgba(255,255,255,.04);position:relative;overflow:hidden}.pxb::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,245,.15),transparent)}.card{padding:16px;margin-bottom:12px}.clabel{font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--yellow);font-weight:900;margin-bottom:10px;display:flex;align-items:center;gap:6px;font-family:'Press Start 2P',monospace}.clabel::after{content:'';flex:1;height:1px;background:var(--border)}.btn{width:100%;padding:14px;border:none;font-family:'Cairo',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;margin-top:8px;position:relative;transition:all .1s;letter-spacing:1px;border-radius:2px}.btn-c{background:var(--cyan);color:#000;box-shadow:0 5px 0 #007a76,0 8px 20px rgba(0,255,245,.25)}.btn-c:active{transform:translateY(4px);box-shadow:0 1px 0 #007a76}.btn-p{background:var(--pink);color:#fff;box-shadow:0 5px 0 #7a0035,0 8px 20px rgba(255,0,110,.25)}.btn-p:active{transform:translateY(4px);box-shadow:0 1px 0 #7a0035}.btn-y{background:var(--yellow);color:#000;box-shadow:0 5px 0 #7a6d00,0 8px 20px rgba(255,230,0,.25)}.btn-y:active{transform:translateY(4px);box-shadow:0 1px 0 #7a6d00}.btn-g{background:var(--green);color:#000;box-shadow:0 5px 0 #1a7a06,0 8px 20px rgba(57,255,20,.25)}.btn-g:active{transform:translateY(4px);box-shadow:0 1px 0 #1a7a06}.btn-ghost{background:transparent;color:var(--dim);border:2px solid var(--border);box-shadow:0 4px 0 rgba(0,0,0,.4)}.btn-ghost:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.4)}.btn-ghost:hover{color:var(--text)}.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}.lang-btn{padding:22px 10px;background:var(--card2);border:2px solid var(--border);color:var(--text);font-family:'Cairo',sans-serif;font-weight:900;font-size:1.1rem;cursor:pointer;text-align:center;box-shadow:4px 4px 0 #000;transition:.15s;border-radius:2px}.lang-btn:active,.lang-btn.sel{border-color:var(--cyan);background:rgba(0,255,245,.1);box-shadow:2px 2px 0 #000;transform:translate(2px,2px)}.lang-sub{font-size:.7rem;color:var(--dim);display:block;margin-top:4px}.inp{width:100%;padding:11px 14px;background:rgba(0,0,0,.4);border:2px solid var(--border);color:var(--text);font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:700;text-align:center;outline:none;margin-bottom:8px;transition:border-color .2s;box-shadow:inset 0 2px 4px rgba(0,0,0,.4);border-radius:2px}.inp:focus{border-color:var(--cyan)}.counter-row{display:flex;align-items:center;justify-content:center;gap:20px}.cnt-btn{width:44px;height:44px;background:var(--card2);border:2px solid var(--border);color:var(--text);font-size:1.4rem;font-weight:900;cursor:pointer;box-shadow:3px 3px 0 #000;display:flex;align-items:center;justify-content:center;transition:.1s;font-family:'Cairo',sans-serif;border-radius:2px}.cnt-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000;background:var(--pink)}.cnt-val{font-size:2.6rem;font-weight:900;color:var(--yellow);min-width:50px;text-align:center;font-family:'Press Start 2P',monospace}.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.cat-item{background:rgba(0,0,0,.35);border:2px solid var(--border);padding:12px 5px;text-align:center;cursor:pointer;transition:.15s;box-shadow:2px 2px 0 #000;border-radius:2px}.cat-item:active,.cat-item.sel{border-color:var(--yellow);background:rgba(255,230,0,.12);box-shadow:1px 1px 0 #000;transform:translate(1px,1px)}.cat-em{font-size:1.7rem;display:block;margin-bottom:3px}.cat-nm{font-size:.68rem;font-weight:800;line-height:1.2}.pun-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.pun-item{background:rgba(0,0,0,.35);border:2px solid var(--border);padding:13px 5px;text-align:center;cursor:pointer;transition:.15s;box-shadow:2px 2px 0 #000;font-size:.72rem;font-weight:800;border-radius:2px}.pun-item:active,.pun-item.sel{border-color:var(--pink);background:rgba(255,0,110,.15);box-shadow:1px 1px 0 #000;transform:translate(1px,1px)}.pun-em{font-size:1.5rem;display:block;margin-bottom:3px}.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.time-item{background:rgba(0,0,0,.35);border:2px solid var(--border);padding:11px 5px;text-align:center;cursor:pointer;transition:.15s;box-shadow:2px 2px 0 #000;font-size:.72rem;font-weight:800;border-radius:2px}.time-item.sel{border-color:var(--green);background:rgba(57,255,20,.12);box-shadow:1px 1px 0 #000;transform:translate(1px,1px)}.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0}.toggle-lbl{font-size:.85rem;font-weight:700}.toggle{position:relative;width:50px;height:26px;cursor:pointer}.toggle input{opacity:0;width:0;height:0}.slider{position:absolute;inset:0;background:#222;border:2px solid var(--border);transition:.3s;border-radius:2px}.slider::before{content:'';position:absolute;height:18px;width:18px;left:2px;top:2px;background:var(--dim);transition:.3s}input:checked+.slider{background:rgba(0,255,245,.2);border-color:var(--cyan)}input:checked+.slider::before{transform:translateX(22px);background:var(--cyan)}.announce-screen{text-align:center;padding:40px 20px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}.ann-badge{background:var(--pink);color:#fff;font-size:.55rem;font-weight:900;letter-spacing:3px;padding:4px 14px;text-transform:uppercase;font-family:'Press Start 2P',monospace}.ann-icon{font-size:4rem}.ann-title{font-size:1.8rem;font-weight:900;line-height:1.2;color:var(--cyan)}.ann-sub{color:var(--dim);font-size:.9rem;font-weight:700}.bomb-screen{gap:10px}.player-box{text-align:center;padding:12px;background:rgba(0,255,245,.06);border:2px solid rgba(0,255,245,.25);box-shadow:0 0 20px rgba(0,255,245,.08)}.p-label{font-size:.55rem;letter-spacing:3px;color:var(--dim);font-weight:700;text-transform:uppercase;font-family:'Press Start 2P',monospace}.p-name{font-size:1.8rem;font-weight:900;color:var(--yellow);line-height:1.1}.p-team{font-size:.72rem;font-weight:700;color:var(--cyan);margin-top:2px}.p-lives{font-size:1rem;margin-top:3px;letter-spacing:2px}.bomb-wrap{display:flex;justify-content:center;align-items:center;padding:8px 0}.bomb-emoji{font-size:5rem;transition:transform .1s;display:inline-block}.bomb-emoji.pulse{animation:bPulse .6s ease-in-out infinite}@keyframes bPulse{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.08) rotate(5deg)}}.bomb-emoji.fast{animation:bFast .3s ease-in-out infinite}@keyframes bFast{0%,100%{transform:scale(1) rotate(-8deg)}50%{transform:scale(1.12) rotate(8deg)}}.bomb-emoji.ultra{animation:bUltra .15s ease-in-out infinite}@keyframes bUltra{0%,100%{transform:scale(1) rotate(-10deg);filter:drop-shadow(0 0 8px var(--pink))}50%{transform:scale(1.15) rotate(10deg);filter:drop-shadow(0 0 20px var(--pink))}}.bomb-emoji.shake{animation:bShake 0.08s ease-in-out infinite}@keyframes bShake{0%,100%{transform:translateX(-4px) scale(1.1)}50%{transform:translateX(4px) scale(1.1)}}.q-box{padding:18px;text-align:center;min-height:110px;display:flex;align-items:center;justify-content:center}.q-cat{font-size:.6rem;letter-spacing:2px;color:var(--pink);font-weight:900;text-transform:uppercase;margin-bottom:8px;font-family:'Press Start 2P',monospace}.q-text{font-size:1.2rem;font-weight:900;line-height:1.5;color:var(--text)}.q-type{font-size:.65rem;color:var(--dim);margin-top:6px;font-weight:700}.score-row{display:flex;gap:8px}.score-box{flex:1;padding:10px;text-align:center;background:rgba(0,0,0,.3);border:2px solid var(--border)}.score-team{font-size:.6rem;letter-spacing:2px;color:var(--dim);font-weight:700;text-transform:uppercase}.score-val{font-size:1.8rem;font-weight:900;font-family:'Press Start 2P',monospace}.score-a{color:var(--cyan)}.score-b{color:var(--pink)}.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}.btn-row .btn{margin-top:0}.red-flash{position:fixed;inset:0;pointer-events:none;z-index:999;border:6px solid transparent;transition:border-color .1s}.red-flash.on{animation:rFlash .5s steps(2) infinite}@keyframes rFlash{0%{border-color:rgba(255,0,110,.8)}50%{border-color:transparent}}.explode-screen{text-align:center;padding:30px 16px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:radial-gradient(ellipse,rgba(255,0,110,.25) 0%,transparent 70%)}.exp-big{font-size:5rem;animation:eSpin .5s ease-out}@keyframes eSpin{0%{transform:scale(0) rotate(0deg)}60%{transform:scale(1.3) rotate(180deg)}100%{transform:scale(1) rotate(360deg)}}.exp-name{font-size:2rem;font-weight:900;color:var(--pink);text-shadow:0 0 20px var(--pink)}.exp-sub{font-size:1rem;color:var(--dim);font-weight:700}.exp-pts{font-size:.8rem;font-weight:700;padding:6px 14px;background:rgba(255,0,110,.15);border:2px solid rgba(255,0,110,.3);color:var(--pink)}.elim-badge{background:var(--pink);color:#fff;padding:6px 166px;font-size:.7rem;font-weight:900;letter-spacing:2px;font-family:'Press Start 2P',monospace}.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}.stat-card{padding:12px;text-align:center;background:rgba(0,0,0,.3);border:2px solid var(--border)}.stat-icon{font-size:1.6rem;display:block;margin-bottom:4px}.stat-title{font-size:.6rem;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}.stat-val{font-size:.9rem;font-weight:900;color:var(--yellow)}.team-result{padding:14px;text-align:center;margin-bottom:8px}.tr-name{font-size:.7rem;letter-spacing:2px;color:var(--dim);font-weight:700}.tr-score{font-size:2.5rem;font-weight:900;font-family:'Press Start 2P',monospace}.winner-box{padding:20px;text-align:center;background:rgba(57,255,20,.06);border:2px solid var(--green);box-shadow:0 0 30px rgba(57,255,20,.15)}.winner-crown{font-size:3rem;display:block;margin-bottom:8px}.winner-name{font-size:1.6rem;font-weight:900;color:var(--green);text-shadow:0 0 15px var(--green)}.sep{height:1px;background:var(--border);margin:8px 0}.toggle-daring{padding:12px 14px;background:rgba(255,0,110,.08);border:2px solid rgba(255,0,110,.3);margin-bottom:8px}.daring-warn{font-size:.68rem;color:var(--pink);font-weight:700;margin-top:4px}#flashOverlay{position:fixed;inset:0;background:rgba(255,0,110,.6);pointer-events:none;z-index:9999;opacity:0;transition:opacity .1s}.rounds-row{display:flex;align-items:center;gap:14px;padding:8px 0}.rounds-label{font-size:.8rem;font-weight:700;flex:1}.nq-badge{display:inline-block;padding:2px 8px;font-size:.58rem;font-weight:900;letter-spacing:1px;font-family:'Press Start 2P',monospace;border-radius:1px}.nq-double{background:var(--yellow);color:#000}.nq-boss{background:var(--pink);color:#fff}.scoreboard{margin-bottom:10px}.sb-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border)}.sb-row:last-child{border-bottom:none}.sb-name{font-size:.85rem;font-weight:800}.sb-pts{font-size:.8rem;font-weight:900;font-family:'Press Start 2P',monospace}.sb-pts.pos{color:var(--green)}.sb-pts.neg{color:var(--pink)}.round-indicator{display:flex;gap:4px;justify-content:center;margin-bottom:8px}.ri-dot{width:10px;height:10px;background:var(--border);border:1px solid #333}.ri-dot.done{background:var(--cyan)}.ri-dot.cur{background:var(--pink);animation:riPulse .8s ease-in-out infinite}@keyframes riPulse{0%,100%{opacity:1}50%{opacity:.4}}.back-btn{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--dim);font-family:'Cairo',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;padding:6px 0;margin-bottom:8px}.back-btn:hover{color:var(--text)}.score-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}.score-row::-webkit-scrollbar{height:3px}.score-row::-webkit-scrollbar-thumb{background:var(--border)}.home-btn{background:transparent;color:var(--dim);border:2px solid var(--border);width:100%;padding:12px;font-family:'Cairo',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:8px;border-radius:2px}.home-btn:active{background:rgba(255,255,255,.05)}</style>
</head>
<body>
<div id="flashOverlay"></div>
<div class="red-flash" id="redFlash"></div>
<div class="wrap">


<div class="screen active" id="sLang">
  <div class="logo-wrap">
    <span class="logo-bomb">💣</span>
    <span class="logo-nuke">NUKE</span>
    <div class="logo-by">by Ayad M Ismail</div>
  </div>
  <div class="card pxb" style="margin-top:16px">
    <div class="clabel">⚙ اختار اللغة | زمان هەڵبژێرە</div>
    <div class="lang-grid">
      <button class="lang-btn" onclick="setLang('ar')">
        <strong>عربي</strong>
        <span class="lang-sub">عراقي</span>
      </button>
      <button class="lang-btn" onclick="setLang('ku')">
        <strong>کوردی</strong>
        <span class="lang-sub">سۆرانی</span>
      </button>
    </div>
  </div>
</div>


<div class="screen" id="sSetup">
  <div class="logo-wrap" style="padding:14px 0 8px">
    <span style="font-family:'Press Start 2P',monospace;font-size:2rem;color:var(--cyan);text-shadow:0 0 10px var(--cyan)">NUKE</span>
  </div>
  <button class="back-btn" onclick="goLang()">◄ <span id="txtBack"></span></button>

  
  <div class="card pxb">
    <div class="clabel" id="lblPlayers"></div>
    <div class="counter-row">
      <button class="cnt-btn" onclick="adjPlayers(-1)">−</button>
      <span class="cnt-val" id="pCount">4</span>
      <button class="cnt-btn" onclick="adjPlayers(1)">+</button>
    </div>
    <div id="playerNames" style="margin-top:12px"></div>
  </div>

  
  <div class="card pxb">
    <div class="clabel" id="lblTeams"></div>
    <div class="toggle-row">
      <span class="toggle-lbl" id="txtTeamMode"></span>
      <label class="toggle"><input type="checkbox" id="teamToggle" onchange="toggleTeams()"><span class="slider"></span></label>
    </div>
    <div id="teamNamesWrap" style="display:none;margin-top:10px">
      <input class="inp" id="teamAName" placeholder="فريق A" maxlength="20">
      <input class="inp" id="teamBName" placeholder="فريق B" maxlength="20">
    </div>
    <div id="pptWrap" style="display:none;align-items:center;justify-content:space-between;padding:8px 0;margin-top:4px">
      <span class="toggle-lbl" id="lblPPT"></span>
      <div class="counter-row" style="gap:12px">
        <button class="cnt-btn" onclick="adjPPT(-1)" style="width:38px;height:38px">−</button>
        <span class="cnt-val" id="pptVal" style="font-size:1.8rem;min-width:35px">2</span>
        <button class="cnt-btn" onclick="adjPPT(1)" style="width:38px;height:38px">+</button>
      </div>
    </div>
  </div>

  
  <div class="card pxb">
    <div class="clabel" id="lblRounds"></div>
    <div class="rounds-row">
      <span class="rounds-label" id="txtRoundsLabel"></span>
      <div class="counter-row" style="gap:14px">
        <button class="cnt-btn" onclick="adjRounds(-1)">−</button>
        <span class="cnt-val" id="rCount" style="font-size:2rem">3</span>
        <button class="cnt-btn" onclick="adjRounds(1)">+</button>
      </div>
    </div>
  </div>

  
  <div class="card pxb">
    <div class="clabel" id="lblCats"></div>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  
  <div class="card pxb">
    <div class="clabel" id="lblPun"></div>
    <div class="pun-grid" id="punGrid"></div>
  </div>

  
  <div class="card pxb">
    <div class="clabel" id="lblTime"></div>
    <div class="time-grid" id="timeGrid"></div>
  </div>

  
  <div class="card pxb toggle-daring">
    <div class="toggle-row">
      <span class="toggle-lbl" id="txtDaring"></span>
      <label class="toggle"><input type="checkbox" id="daringToggle"><span class="slider"></span></label>
    </div>
    <div class="daring-warn" id="txtDaringWarn"></div>
  </div>

  <button class="btn btn-c" onclick="startGame()" id="btnStart"></button>
</div>


<div class="screen" id="sAnnounce">
  <div class="announce-screen">
    <div class="ann-badge" id="annBadge"></div>
    <div class="ann-icon" id="annIcon"></div>
    <div class="ann-title" id="annTitle"></div>
    <div class="ann-sub" id="annSub"></div>
    <button class="btn btn-c" id="annBtn" onclick="startRound()" style="margin-top:20px;max-width:280px"></button>
  </div>
</div>


<div class="screen bomb-screen" id="sGame">
  <div class="score-row" id="scoreRow"></div>
  <div class="round-indicator" id="roundDots"></div>

  <div class="player-box pxb">
    <div class="p-label" id="pLabel"></div>
    <div class="p-name" id="pName"></div>
    <div class="p-team" id="pTeam"></div>
    <div class="p-lives" id="pLives"></div>
  </div>

  <div class="nq-badge" id="specialBadge" style="display:none;margin:0 auto"></div>

  <div class="bomb-wrap">
    <span class="bomb-emoji" id="bombEmoji">💣</span>
  </div>

  <div class="q-box pxb">
    <div>
      <div class="q-cat" id="qCat"></div>
      <div class="q-text" id="qText"></div>
      <div class="q-answer" id="qAnswer" style="display:none;margin-top:10px;font-size:1rem;font-weight:900;color:var(--green);text-shadow:0 0 10px var(--green);padding:8px;background:rgba(57,255,20,0.1);border:1px solid var(--green);border-radius:4px;"></div>
    </div>
  </div>
  <button class="btn btn-y" id="btnReveal" onclick="revealAnswer()" style="margin-top:4px;"></button>

  <div class="btn-row" id="btnRowJudge" style="display:none;">
    <button class="btn btn-p" id="btnWrong" onclick="dontKnow()"></button>
    <button class="btn btn-c" id="btnCorrect" onclick="passQ()"></button>
  </div>
  <div class="btn-row" id="btnRowNormal">
    <button class="btn btn-p" id="btnDontKnow" onclick="dontKnow()"></button>
    <button class="btn btn-c" id="btnPass" onclick="passQ()"></button>
  </div>
</div>


<div class="screen" id="sExplode">
  <div class="explode-screen">
    <div class="exp-big">💥</div>
    <div class="exp-name" id="expName"></div>
    <div class="exp-sub" id="expSub"></div>
    <div class="exp-pts" id="expPts"></div>
    <div class="elim-badge" id="elimBadge" style="display:none"></div>
    <button class="btn btn-c" id="expBtn" onclick="afterExplode()" style="margin-top:16px;max-width:280px"></button>
  </div>
</div>


<div class="screen" id="sRoundEnd">
  <div style="padding:20px 0 8px;text-align:center">
    <div style="font-family:'Press Start 2P',monospace;font-size:1rem;color:var(--cyan)" id="reTitle"></div>
  </div>
  <div id="reTeamScores" style="margin-bottom:8px"></div>
  <div class="card pxb">
    <div class="clabel" id="lblRoundScores">النقاط</div>
    <div class="scoreboard" id="reScores"></div>
  </div>
  <button class="btn btn-c" id="reBtn" onclick="nextRoundAnnounce()" style="margin-bottom:8px"></button>
  <button class="home-btn" onclick="window.location.href='../index.html'">🏠 الموقع الرئيسي | سەرەتا</button>
</div>


<div class="screen" id="sMidScore">

/* ===================== SOUND & HAPTICS ===================== */
var SFX = {
    ctx: null,
    init: function() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.ctx.state === 'suspended') this.ctx.resume();
    },
    play: function(freq, type, dur, vol, delay, freqEnd) {
        try {
            this.init();
            var o = this.ctx.createOscillator();
            var g = this.ctx.createGain();
            var start = this.ctx.currentTime + (delay || 0);
            o.type = type || 'sine';
            o.frequency.setValueAtTime(freq, start);
            if(freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, start + dur);
            g.gain.setValueAtTime(vol || 0.1, start);
            g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
            o.connect(g); g.connect(this.ctx.destination);
            o.start(start); o.stop(start + dur);
        } catch(e) {}
    },
    // تيك تاك عادي - نبضة هادئة
    tick: function() {
        this.play(440, 'sine', 0.08, 0.15);
        this.play(880, 'sine', 0.04, 0.06, 0.05);
    },
    // تيك تاك سريع - أكثر حدة
    fastTick: function() {
        this.play(600, 'square', 0.06, 0.2);
        this.play(1200, 'sine', 0.03, 0.08, 0.04);
    },
    // تيك تاك خطر - ثنائي مرعب
    dangerTick: function() {
        this.play(800, 'sawtooth', 0.08, 0.3);
        this.play(400, 'square', 0.08, 0.2, 0.04);
        this.play(1600, 'sine', 0.04, 0.1, 0.08);
    },
    // انفجار قوي ومركب
    explode: function() {
        try {
            this.init();
            var ctx = this.ctx;
            // ضوضاء بيضاء - الانفجار الرئيسي
            var dur = 1.5;
            var buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
            var data = buf.getChannelData(0);
            for(var i = 0; i < data.length; i++) {
                var t = i / ctx.sampleRate;
                data[i] = (Math.random()*2-1) * Math.exp(-t * 3);
            }
            var src = ctx.createBufferSource();
            src.buffer = buf;
            var dist = ctx.createWaveShaper();
            var curve = new Float32Array(256);
            for(var i=0;i<256;i++) curve[i] = (i<128?-1:1)*Math.pow(Math.abs(i/128-1),0.3);
            dist.curve = curve;
            var g1 = ctx.createGain();
            g1.gain.setValueAtTime(1.0, ctx.currentTime);
            g1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + dur);
            var f = ctx.createBiquadFilter();
            f.type='lowpass'; f.frequency.value=600;
            src.connect(dist); dist.connect(f); f.connect(g1); g1.connect(ctx.destination);
            src.start();
            // نغمة ضربة عميقة
            this.play(80, 'sine', 0.5, 0.8, 0, 30);
            this.play(150, 'sine', 0.3, 0.5, 0.05, 50);
            // صوت شظايا
            this.play(2000, 'sawtooth', 0.2, 0.15, 0.1, 100);
            this.play(1500, 'square', 0.15, 0.1, 0.15, 200);
        } catch(e) {}
    },
    // تمرير ناجح - صوت إيجابي
    pass: function() {
        this.play(523, 'sine', 0.12, 0.2);
        this.play(659, 'sine', 0.12, 0.2, 0.08);
        this.play(784, 'sine', 0.15, 0.2, 0.16);
    },
    // كشف الجواب
    reveal: function() {
        this.play(440, 'sine', 0.1, 0.15);
        this.play(550, 'sine', 0.15, 0.15, 0.06);
    },
    // إجابة صحيحة
    correct: function() {
        this.play(523, 'sine', 0.1, 0.2);
        this.play(784, 'sine', 0.1, 0.2, 0.08);
        this.play(1046, 'sine', 0.2, 0.2, 0.16);
    },
    // إجابة خاطئة
    wrong: function() {
        this.play(300, 'sawtooth', 0.2, 0.25);
        this.play(200, 'sawtooth', 0.25, 0.2, 0.12);
        this.play(150, 'square', 0.2, 0.15, 0.25);
    },
    // فوز
    win: function() {
        var notes=[523,659,784,1046];
        notes.forEach(function(n,i){SFX.play(n,'sine',0.3,0.25,i*0.12);});
    }
};

// اهتزاز الموبايل
function vibrate(pattern) {
    if (navigator.vibrate) navigator.vibrate(pattern);
}

// تيك تاك يتغير حسب الوقت
var tickInterval = null;
function startTickSound() {
    stopTickSound();
    tickInterval = setInterval(function() {
        var pct = G.bombTime / G.bombTotal;
        if (pct > 0.6) SFX.tick();
        else if (pct > 0.35) SFX.fastTick();
        else { SFX.dangerTick(); vibrate(30); }
    }, 1000);
}
function stopTickSound() {
    if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
}

d.className='time-item'+(G.timeMode===tm.k?' sel':'');
d.textContent=t(tm.lk);
d.onclick=(function(tk){return function(){G.timeMode=tk;renderTimeGrid();};})(tm.k);
g.appendChild(d);
});
}

// ===================== START GAME =====================
function startGame(){
var names=[];
document.querySelectorAll('#playerNames .inp').forEach(function(inp,i){
names.push(inp.value.trim()||((G.lang==='ar'?'لاعب ':'یاریزان ')+(i+1)));
});
G.playerNames=names;
G.scores={};G.lives={};G.eliminated={};
G.passCount={};G.explodeCount={};G.dontKnowCount={};
G.firstExplode=null;G.teamScores={A:0,B:0};
names.forEach(function(n){
G.scores[n]=0;G.lives[n]=3;G.eliminated[n]=false;
G.passCount[n]=0;G.explodeCount[n]=0;G.dontKnowCount[n]=0;
});
G.teamOf={};
if(G.teamsOn){names.forEach(function(n,i){G.teamOf[n]=i%2===0?'A':'B';});}
G.teamAName=document.getElementById('teamAName').value.trim()||t('teamA');
G.teamBName=document.getElementById('teamBName').value.trim()||t('teamB');
G.daringOn=document.getElementById('daringToggle').checked;
G.currentRound=0;G.currentIdx=0;
G.activePlayers=names.slice();G.usedQs=[];
buildQPool();
announceRound();
}

function buildQPool(){
var cats=G.selectedCats.indexOf('mix')>-1
?['food','sport','challenge','geo','history','movies','famous','general','gaming','religion']
:G.selectedCats;
var pool=[];
cats.forEach(function(cat){
if(QB[cat]&&QB[cat][G.lang]){
QB[cat][G.lang].forEach(function(q,idx){
// تجنب التكرار باستخدام مفتاح فريد
var key=cat+'_'+idx;
if(G.usedQs.indexOf(key)===-1){
pool.push({cat:cat,q:q,key:key});
}
});
}
});
if(G.daringOn&&QB.daring&&QB.daring[G.lang]){
QB.daring[G.lang].forEach(function(q,idx){
var key='daring_'+idx;
if(G.usedQs.indexOf(key)===-1){
pool.push({cat:'daring',q:q,key:key});
}
});
}
// إذا ما في أسئلة جديدة، صفّر الاستخدام
if(pool.length<5){
G.usedQs=[];
return buildQPool();
}
for(var i=pool.length-1;i>0;i--){
var j=Math.floor(Math.random()*(i+1));
var tmp=pool[i];pool[i]=pool[j];pool[j]=tmp;
}
G.qPool=pool;
}

function getNextQ(){
if(G.qPool.length===0)buildQPool();
var q=G.qPool.pop();
// حفظ السؤال كمستخدم
if(q&&q.key)G.usedQs.push(q.key);
return q;
}

// ===================== ANNOUNCE ROUND =====================
function announceRound(){
G.currentRound++;
var r=Math.random();
if(r<0.6){G.roundType='normal';G.multiplier=1;}
else if(r<0.85){G.roundType='double';G.multiplier=2;}
else{G.roundType='boss';G.multiplier=3;}
document.getElementById('annBadge').textContent=t('roundAnn')+' '+G.currentRound;
var icon,title,sub;
if(G.roundType==='normal'){icon='💣';title=t('normalRound');sub=t('normalSub');}
else if(G.roundType==='double'){icon='⚡';title=t('doubleRound');sub=t('doubleSub');}
else{icon='💀';title=t('bossRound');sub=t('bossSub');}
document.getElementById('annIcon').textContent=icon;
document.getElementById('annTitle').textContent=title;
document.getElementById('annSub').textContent=sub;
document.getElementById('annBtn').textContent=t('tapStart');
updateRoundDots();
show('sAnnounce');
}

function updateRoundDots(){
var dots=document.getElementById('roundDots');dots.innerHTML='';
for(var i=0;i<G.numRounds;i++){
var d=document.createElement('div');
d.className='ri-dot'+(i<G.currentRound-1?' done':i===G.currentRound-1?' cur':'');
dots.appendChild(d);
}
}

// ===================== ROUND =====================
function startRound(){
G.currentIdx=0;
show('sGame');
updateScoreRow();
nextPlayerTurn();
}

function getActivePlayers(){
return G.playerNames.filter(function(n){return !G.eliminated[n];});
}

function nextPlayerTurn(){
var active=getActivePlayers();
if(active.length<2){endGame();return;}
G.activePlayers=active;
if(G.currentIdx>=active.length)G.currentIdx=0;
var player=active[G.currentIdx];
document.getElementById('pLabel').textContent=t('playerLabel');
document.getElementById('pName').textContent=player;
if(G.teamsOn&&G.teamOf[player]){
var team=G.teamOf[player];
document.getElementById('pTeam').textContent=team==='A'?G.teamAName:G.teamBName;
document.getElementById('pTeam').style.color=team==='A'?'var(--cyan)':'var(--pink)';
}else{document.getElementById('pTeam').textContent='';}
if(G.punMode==='lives'){
document.getElementById('pLives').textContent='❤️'.repeat(Math.max(0,G.lives[player]));
}else{document.getElementById('pLives').textContent='';}
var sb=document.getElementById('specialBadge');
if(G.roundType==='double'){sb.style.display='inline-block';sb.className='nq-badge nq-double';sb.textContent='DOUBLE ⚡';}
else if(G.roundType==='boss'){sb.style.display='inline-block';sb.className='nq-badge nq-boss';sb.textContent='BOSS 💀';}
else{sb.style.display='none';}
document.getElementById('bombEmoji').textContent='💣';
document.getElementById('bombEmoji').className='bomb-emoji pulse';
var qObj=getNextQ();G.currentQ=qObj;
document.getElementById('qCat').textContent=t('cat_'+qObj.cat)||qObj.cat;
document.getElementById('qText').textContent=qObj.q[0];
// إخفاء الجواب وإظهار زر الكشف
document.getElementById('qAnswer').style.display='none';
document.getElementById('btnReveal').style.display='block';
document.getElementById('btnReveal').textContent=G.lang==='ar'?'اكشف الجواب 👁️':'وەڵامەکە پیشان بدە 👁️';
document.getElementById('btnRowNormal').style.display='grid';
document.getElementById('btnRowJudge').style.display='none';
document.getElementById('btnDontKnow').textContent=t('dontKnow');
document.getElementById('btnPass').textContent=t('pass');
startBombTimer();
}

function revealAnswer(){
stopBombTimer();
SFX.reveal();
var qObj=G.currentQ;
var answer=qObj.q[1];
var answerEl=document.getElementById('qAnswer');
answerEl.textContent=(G.lang==='ar'?'الجواب: ':'وەڵام: ')+answer;
answerEl.style.display='block';
document.getElementById('btnReveal').style.display='none';
if(qObj.cat==='challenge'||qObj.cat==='daring'){
document.getElementById('btnRowNormal').style.display='grid';
document.getElementById('btnRowJudge').style.display='none';
startBombTimer();
}else{
document.getElementById('btnRowNormal').style.display='none';
document.getElementById('btnRowJudge').style.display='grid';
document.getElementById('btnWrong').textContent=G.lang==='ar'?'❌ غلط':'❌ هەڵەیە';
document.getElementById('btnCorrect').textContent=G.lang==='ar'?'✅ صح':'✅ ڕاستە';
}
}

function startBombTimer(){
stopBombTimer();
var secs;
if(G.timeMode==='30')secs=30;
else if(G.timeMode==='60')secs=60;
else secs=12+Math.floor(Math.random()*33);
G.bombTotal=secs;G.bombTime=secs;
var bomb=document.getElementById('bombEmoji');
G.bombTimer=setInterval(function(){
G.bombTime--;
var pct=G.bombTime/G.bombTotal;
bomb.className='bomb-emoji';
if(pct>0.6){bomb.classList.add('pulse');SFX.tick();}
else if(pct>0.35){bomb.classList.add('fast');SFX.fastTick();vibrate(20);}
else if(pct>0.15){bomb.classList.add('ultra');SFX.dangerTick();vibrate([30,20]);}
else{bomb.classList.add('shake');SFX.dangerTick();vibrate([50,30,50]);}
if(pct<=0.15)document.getElementById('redFlash').classList.add('on');
if(G.bombTime<=0)explodeOn(G.activePlayers[G.currentIdx],'timer');
},1000);
}

function stopBombTimer(){
if(G.bombTimer){clearInterval(G.bombTimer);G.bombTimer=null;}
document.getElementById('redFlash').classList.remove('on');
}

// ===================== ACTIONS =====================
function passQ(){
stopBombTimer();
SFX.correct();
vibrate(30);
var player=G.activePlayers[G.currentIdx];
var pts=G.multiplier;
G.scores[player]=(G.scores[player]||0)+pts;
G.passCount[player]=(G.passCount[player]||0)+1;
if(G.teamsOn&&G.teamOf[player])G.teamScores[G.teamOf[player]]=(G.teamScores[G.teamOf[player]]||0)+pts;
updateScoreRow();
G.currentIdx=(G.currentIdx+1)%G.activePlayers.length;
nextPlayerTurn();
}

function dontKnow(){
stopBombTimer();
SFX.wrong();
vibrate([80,40,80]);
var player=G.activePlayers[G.currentIdx];
G.dontKnowCount[player]=(G.dontKnowCount[player]||0)+1;
explodeOn(player,'dontknow');
}

function explodeOn(player,reason){
stopBombTimer();
// صوت انفجار + اهتزاز قوي
SFX.explode();
vibrate([100,50,100,50,200]);
// فلاش قوي متعدد
var o=document.getElementById('flashOverlay');
o.style.background='rgba(255,0,110,0.8)';
o.style.opacity='1';
setTimeout(function(){o.style.opacity='0.3';},100);
setTimeout(function(){o.style.opacity='0.8';},200);
setTimeout(function(){o.style.opacity='0.2';},300);
setTimeout(function(){o.style.opacity='0';o.style.background='rgba(255,0,110,0.6)';},500);
document.getElementById('bombEmoji').textContent='💥';
if(!G.firstExplode)G.firstExplode=player;
G.explodeCount[player]=(G.explodeCount[player]||0)+1;
var punMsg='';var isElim=false;
if(G.punMode==='pts'){
G.scores[player]=(G.scores[player]||0)-5;
if(G.teamsOn&&G.teamOf[player])G.teamScores[G.teamOf[player]]=(G.teamScores[G.teamOf[player]]||0)-5;
punMsg=G.lang==='ar'?'💀 خسرت 5 نقاط!':'💀 5 خاڵت لەدەستدا!';
}else if(G.punMode==='lives'){
G.lives[player]--;
if(G.lives[player]<=0){G.eliminated[player]=true;isElim=true;punMsg=t('punElim');}
else punMsg=t('punLives')+' ('+G.lives[player]+' '+t('livesLeft')+')';
}else if(G.punMode==='elim'){
G.eliminated[player]=true;isElim=true;punMsg=t('punElim');
}
document.getElementById('expName').textContent=player;
document.getElementById('expSub').textContent=t('exploded');
document.getElementById('expPts').textContent=punMsg;
var eb=document.getElementById('elimBadge');
if(isElim){eb.style.display='block';eb.textContent=t('punElimBadge');}
else eb.style.display='none';
document.getElementById('expBtn').textContent=t('continueBtn');
updateScoreRow();
show('sExplode');
}

function afterExplode(){
document.getElementById('bombEmoji').textContent='💣';
document.getElementById('bombEmoji').className='bomb-emoji pulse';
if(getActivePlayers().length<2){endGame();return;}
endRound();
}

function updateScoreRow(){
var row=document.getElementById('scoreRow');
if(G.teamsOn){
row.innerHTML='<div class="score-box"><div class="score-team">'+G.teamAName+'</div><div class="score-val score-a">'+(G.teamScores.A||0)+'</div></div>'+
'<div class="score-box"><div class="score-team">'+G.teamBName+'</div><div class="score-val score-b">'+(G.teamScores.B||0)+'</div></div>';
}else{
var sorted=G.playerNames.slice().sort(function(a,b){return (G.scores[b]||0)-(G.scores[a]||0);});
var colors=['score-a','score-b','score-a','score-b','score-a','score-b','score-a','score-b'];
row.innerHTML=sorted.map(function(p,i){
return '<div class="score-box" style="min-width:70px;flex:none"><div class="score-team" style="font-size:.5rem">'+p+'</div><div class="score-val '+(colors[i]||'score-a')+'" style="font-size:1.2rem">'+(G.scores[p]||0)+'</div></div>';
}).join('');
}
}

// ===================== ROUND END =====================
function endRound(){
document.getElementById('reTitle').textContent=t('roundEndTitle')+' '+G.currentRound;
var rts=document.getElementById('reTeamScores');
if(G.teamsOn){
rts.innerHTML='<div class="teams-badge">'+
'<div class="team-badge team-a-badge">'+G.teamAName+': '+(G.teamScores.A||0)+' '+t('pts')+'</div>'+
'<div class="team-badge team-b-badge">'+G.teamBName+': '+(G.teamScores.B||0)+' '+t('pts')+'</div>'+
'</div>';
}else rts.innerHTML='';
var sorted=G.playerNames.slice().sort(function(a,b){return (G.scores[b]||0)-(G.scores[a]||0);});
document.getElementById('reScores').innerHTML=sorted.map(function(p){
var pts=G.scores[p]||0;
return '<div class="sb-row"><span class="sb-name">'+(G.eliminated[p]?'🚫 ':'')+p+'</span>'+
'<span class="sb-pts '+(pts>=0?'pos':'neg')+'">'+pts+' '+t('pts')+'</span></div>';
}).join('');
var isLast=G.currentRound>=G.numRounds||getActivePlayers().length<2;
document.getElementById('reBtn').textContent=isLast?t('endGame'):t('roundEndBtn');
var dots=document.getElementById('roundDots');dots.innerHTML='';
for(var i=0;i<G.numRounds;i++){
var d=document.createElement('div');
d.className='ri-dot'+(i<G.currentRound?' done':'');
dots.appendChild(d);
}
show('sRoundEnd');
}

function nextRoundAnnounce(){
if(G.currentRound>=G.numRounds||getActivePlayers().length<2){endGame();return;}
if(G.numRounds>3&&G.currentRound%2===0){showMidScore();}
else{announceRound();}
}

function showMidScore(){
document.getElementById('msTitle').textContent=t('roundNum')+' '+G.currentRound+'/'+G.numRounds;
var tl=document.getElementById('msTeamLabel'),ts=document.getElementById('msTeamScores');
if(G.teamsOn){
tl.textContent=t('teamScore');
ts.innerHTML='<div class="teams-badge">'+
'<div class="team-badge team-a-badge">'+G.teamAName+': '+(G.teamScores.A||0)+' '+t('pts')+'</div>'+
'<div class="team-badge team-b-badge">'+G.teamBName+': '+(G.teamScores.B||0)+' '+t('pts')+'</div>'+
'</div>';
}else{tl.textContent='';ts.innerHTML='';}
document.getElementById('msPlayerLabel').textContent=t('playerScore');
var sorted=G.playerNames.slice().sort(function(a,b){return (G.scores[b]||0)-(G.scores[a]||0);});
document.getElementById('msPlayerScores').innerHTML=sorted.map(function(p){
var pts=G.scores[p]||0;
return '<div class="sb-row"><span class="sb-name">'+(G.eliminated[p]?'🚫 ':'')+p+'</span>'+
'<span class="sb-pts '+(pts>=0?'pos':'neg')+'">'+pts+' '+t('pts')+'</span></div>';
}).join('');
document.getElementById('msBtn').textContent=t('nextRound');
show('sMidScore');
}

function continueGame(){announceRound();}

// ===================== END GAME =====================
function endGame(){
var sorted=G.playerNames.slice().sort(function(a,b){return (G.scores[b]||0)-(G.scores[a]||0);});
var winner=sorted[0];
document.getElementById('winnerName').textContent='🏆 '+winner;
document.getElementById('winnerScore').textContent=(G.scores[winner]||0)+' '+t('pts');
var tfl=document.getElementById('lblTeamFinal'),tfs=document.getElementById('finalTeamScores');
if(G.teamsOn){
tfl.textContent=t('finalTeam');
var winTeam=((G.teamScores.A||0)>=(G.teamScores.B||0))?G.teamAName:G.teamBName;
tfs.innerHTML='<div class="teams-badge">'+
'<div class="team-badge team-a-badge">'+G.teamAName+': '+(G.teamScores.A||0)+' '+t('pts')+'</div>'+
'<div class="team-badge team-b-badge">'+G.teamBName+': '+(G.teamScores.B||0)+' '+t('pts')+'</div>'+
'</div><div style="text-align:center;margin-top:8px;font-weight:900;color:var(--green)">'+t('winnerTeam')+': '+winTeam+'</div>';
}else{tfl.textContent='';tfs.innerHTML='';}
document.getElementById('lblPlayerFinal').textContent=t('finalPlayer');
document.getElementById('finalPlayerScores').innerHTML=sorted.map(function(p,i){
var pts=G.scores[p]||0;
var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'  ';
return '<div class="sb-row"><span class="sb-name">'+medal+(G.eliminated[p]?' 🚫':' ')+p+'</span>'+
'<span class="sb-pts '+(pts>=0?'pos':'neg')+'">'+pts+' '+t('pts')+'</span></div>';
}).join('');
document.getElementById('lblAchievements').textContent=t('achievements');
renderAchievements(sorted);
document.getElementById('btnPlayAgain').textContent=t('playAgain');
show('sStats');
}

function renderAchievements(sorted){
var ach=[];
ach.push({icon:'🏆',title:t('aWinner'),val:sorted[0]});
var mpName=G.playerNames.reduce(function(a,b){return (G.passCount[a]||0)>=(G.passCount[b]||0)?a:b;});
ach.push({icon:'⬅️',title:t('aPassMost'),val:mpName+' ('+(G.passCount[mpName]||0)+')'});
var meName=G.playerNames.reduce(function(a,b){return (G.explodeCount[a]||0)>=(G.explodeCount[b]||0)?a:b;});
ach.push({icon:'💥',title:t('aExplode'),val:meName+' ('+(G.explodeCount[meName]||0)+')'});
var mdkName=G.playerNames.reduce(function(a,b){return (G.dontKnowCount[a]||0)>=(G.dontKnowCount[b]||0)?a:b;});
ach.push({icon:'❓',title:t('aDontKnow'),val:mdkName});
if(G.firstExplode)ach.push({icon:'💣',title:t('aFirst'),val:G.firstExplode});
var alive=G.playerNames.filter(function(p){return !G.eliminated[p];});
if(alive.length>0){
var lucky=alive.reduce(function(a,b){return (G.explodeCount[a]||0)<=(G.explodeCount[b]||0)?a:b;});
ach.push({icon:'🍀',title:t('aLucky'),val:lucky});
}
document.getElementById('achievementsGrid').innerHTML=ach.map(function(a){
return '<div class="stat-card pxb"><span class="stat-icon">'+a.icon+'</span>'+
'<div class="stat-title">'+a.title+'</div>'+
'<div class="stat-val">'+a.val+'</div></div>';
}).join('');
}

function resetGame(){
stopBombTimer();
G.currentRound=0;
show('sLang');
}
</script>
